server:
  port: 8080
  read_timeout: 15s
  read_header_timeout: 10s
  write_timeout: 30s
  idle_timeout: 60s
  shutdown_timeout: 30s
management:
  port: 9090
rate_limit:
  enabled: true
  requests_per_second: 1000
  wait_timeout: 60s
storage:
  dsn: "jdbc:postgresql://localhost:5432/scimplayground"
  username: "scim_playground"
  password: "scim_playground"
  max_conns: 50
  min_conns: 50
cleanup:
  enabled: true
  interval: 2h
  stale_after: 2160h
logging:
  level: "info"
messages:
  language: "en"
